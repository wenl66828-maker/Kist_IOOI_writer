<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>產出內容 — 誠致教育基金會</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+Antique:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#F7F4EF;--surface:#FFFFFF;--surface2:#F0EDE7;
  --ink:#1A1714;--ink-light:#6B6560;--ink-faint:#B0AAA3;
  --accent:#C4501A;--accent-light:#F5E8E2;
  --border:#DDD8D0;--kist-blue:#1B3A6B;
  --purple:#534AB7;--purple-light:#EEEDFE;
  --teal:#0F6E56;--teal-light:#E1F5EE;
  --amber:#854F0B;--amber-light:#FAEEDA;
  --sans:'Zen Kaku Gothic Antique',sans-serif;
  --mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-weight:400;line-height:1.7;min-height:100vh;display:flex;flex-direction:column;}

/* HEADER */
header{background:var(--kist-blue);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:60px;flex-shrink:0;position:sticky;top:0;z-index:200;}
.logo{display:flex;align-items:center;text-decoration:none;}
.logo-mark{height:28px;width:auto;}
.header-right{display:flex;align-items:center;gap:.5rem;}
.header-btn{font-size:.78rem;color:rgba(255,255,255,.55);text-decoration:none;padding:.375rem .75rem;border-radius:4px;transition:all .15s;white-space:nowrap;border:none;background:none;cursor:pointer;font-family:var(--sans);}
.header-btn:hover{color:white;background:rgba(255,255,255,.1);}
.header-btn.active{color:white;background:rgba(255,255,255,.15);}

/* LAYOUT */
.page-layout{display:grid;grid-template-columns:400px 1fr;flex:1;min-height:0;overflow:hidden;}

/* LEFT */
.left-panel{display:flex;flex-direction:column;border-right:1px solid var(--border);overflow:hidden;background:var(--surface);height:calc(100vh - 60px);position:sticky;top:60px;}
.left-scroll{flex:1;overflow-y:auto;padding:1.5rem;min-height:0;}

/* STEP INDICATOR */
.step-row{display:flex;align-items:center;gap:.75rem;margin-bottom:1.25rem;}
.step-badge{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:.65rem;font-weight:700;flex-shrink:0;}
.step-badge.active{background:var(--purple);color:white;}
.step-badge.done{background:var(--teal);color:white;}
.step-badge.inactive{background:var(--surface2);color:var(--ink-faint);border:1.5px solid var(--border);}
.step-label{font-size:.875rem;font-weight:700;flex:1;}
.step-edit{font-size:.72rem;color:var(--purple);cursor:pointer;}
.step-edit:hover{text-decoration:underline;}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:1rem;}
.search-wrap input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:.55rem 1rem .55rem 2.1rem;font-family:var(--sans);font-size:.82rem;color:var(--ink);outline:none;transition:border-color .15s;}
.search-wrap input:focus{border-color:var(--purple);}
.search-icon{position:absolute;left:.7rem;top:50%;transform:translateY(-50%);color:var(--ink-faint);font-size:.78rem;pointer-events:none;}

/* RECORD LIST */
.record-list{display:flex;flex-direction:column;gap:.5rem;margin-bottom:1rem;}
.record-item{background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:.75rem .875rem;display:flex;align-items:flex-start;gap:.75rem;cursor:pointer;transition:all .15s;}
.record-item:hover{border-color:var(--purple);}
.record-item.selected{border-color:var(--purple);background:var(--purple-light);}
.rec-check{width:17px;height:17px;border:1.5px solid var(--border);border-radius:3px;flex-shrink:0;margin-top:.15rem;display:flex;align-items:center;justify-content:center;font-size:.65rem;transition:all .15s;}
.record-item.selected .rec-check{background:var(--purple);border-color:var(--purple);color:white;}
.rec-info{flex:1;min-width:0;}
.rec-name{font-size:.83rem;font-weight:700;margin-bottom:.1rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rec-meta{font-family:var(--mono);font-size:.62rem;color:var(--ink-faint);}

/* STEP FOOTER (sticky bottom) */
.left-footer{padding:1rem 1.5rem;border-top:1px solid var(--border);flex-shrink:0;}
.sel-count{font-size:.75rem;color:var(--purple);margin-bottom:.625rem;font-weight:500;min-height:1em;}
.next-btn{width:100%;background:var(--purple);color:white;border:none;border-radius:6px;padding:.7rem;font-family:var(--sans);font-size:.875rem;font-weight:700;cursor:pointer;transition:opacity .15s;}
.next-btn:hover{opacity:.88;}
.next-btn:disabled{opacity:.35;cursor:not-allowed;}

/* FORMAT TOGGLE */
.fmt-toggle{display:flex;background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:3px;margin-bottom:1.25rem;}
.fmt-toggle-btn{flex:1;padding:.45rem;border:none;background:none;border-radius:5px;font-family:var(--sans);font-size:.78rem;cursor:pointer;color:var(--ink-light);transition:all .15s;font-weight:400;}
.fmt-toggle-btn.active{background:var(--surface);color:var(--purple);font-weight:700;box-shadow:0 1px 3px rgba(0,0,0,.08);}

/* FORMAT CARDS */
.format-grid{display:flex;flex-direction:column;gap:.5rem;margin-bottom:1rem;}
.format-card{background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:.75rem .875rem;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:.75rem;}
.format-card:hover{border-color:var(--purple);}
.format-card.selected{border-color:var(--purple);background:var(--purple-light);}
.format-card-icon{width:28px;height:28px;border-radius:6px;background:var(--surface2);flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:.9rem;}
.format-card-icon img{width:100%;height:100%;object-fit:cover;}
.format-card-body{flex:1;min-width:0;}
.format-card-name{font-size:.83rem;font-weight:700;margin-bottom:.1rem;}
.format-card-desc{font-size:.68rem;color:var(--ink-light);font-weight:300;}
.format-card.selected .format-card-desc{color:var(--purple);}

/* CUSTOM FORMAT */
.custom-item{background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:.75rem .875rem;display:flex;align-items:center;gap:.625rem;cursor:pointer;transition:all .15s;margin-bottom:.5rem;}
.custom-item:hover{border-color:var(--purple);}
.custom-item.selected{border-color:var(--purple);background:var(--purple-light);}
.custom-item-name{font-size:.83rem;font-weight:700;flex:1;}
.custom-del{background:none;border:none;color:var(--ink-faint);cursor:pointer;font-size:.78rem;padding:.2rem;transition:color .15s;}
.custom-del:hover{color:var(--accent);}
.add-custom-btn{width:100%;background:none;border:1.5px dashed var(--border);border-radius:8px;padding:.65rem;font-family:var(--sans);font-size:.78rem;color:var(--ink-faint);cursor:pointer;transition:all .15s;margin-bottom:1rem;}
.add-custom-btn:hover{border-color:var(--purple);color:var(--purple);}

/* FREE PROMPT */
.free-label{font-size:.75rem;font-weight:500;color:var(--ink-light);margin-bottom:.4rem;}
.free-textarea{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:.65rem .875rem;font-family:var(--sans);font-size:.82rem;color:var(--ink);resize:vertical;min-height:72px;outline:none;transition:border-color .15s;line-height:1.65;margin-bottom:1rem;}
.free-textarea:focus{border-color:var(--purple);}

/* GENERATE BTN */
.generate-btn{width:100%;background:var(--teal);color:white;border:none;border-radius:6px;padding:.75rem;font-family:var(--sans);font-size:.9rem;font-weight:700;cursor:pointer;transition:opacity .15s;}
.generate-btn:hover{opacity:.88;}
.generate-btn:disabled{opacity:.35;cursor:not-allowed;}

/* RIGHT: OUTPUT */
.right-panel{display:flex;flex-direction:column;overflow:hidden;}
.output-header{padding:.875rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.output-title{font-size:.875rem;font-weight:700;color:var(--ink-light);}
.output-actions{display:flex;gap:.4rem;}
.btn-sm{font-family:var(--sans);font-size:.73rem;padding:.35rem .75rem;border-radius:4px;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--ink);transition:all .15s;}
.btn-sm:hover{background:var(--surface2);}
.btn-sm.teal{background:var(--teal);color:white;border-color:var(--teal);font-weight:500;}
.btn-sm.teal:hover{opacity:.88;}
.btn-sm.dim{opacity:.4;cursor:not-allowed;}
.output-body{flex:1;overflow-y:auto;display:flex;flex-direction:column;}
.output-placeholder{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem;text-align:center;color:var(--ink-faint);}
.output-placeholder-icon{font-size:2rem;margin-bottom:.875rem;opacity:.3;}
.output-placeholder-text{font-size:.82rem;font-weight:300;line-height:1.7;}
.output-loading{flex:1;display:none;flex-direction:column;align-items:center;justify-content:center;gap:.875rem;}
.output-loading.on{display:flex;}
.spinner{width:30px;height:30px;border:2px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-label{font-family:var(--mono);font-size:.75rem;color:var(--ink-faint);}
.output-editor{flex:1;padding:1.5rem;font-family:var(--sans);font-size:.9rem;color:var(--ink);line-height:1.85;border:none;outline:none;resize:none;background:var(--surface);font-weight:300;display:none;}

/* DRAFTS DRAWER */
.drawer-overlay{display:none;position:fixed;inset:0;z-index:300;background:rgba(26,23,20,.4);backdrop-filter:blur(2px);}
.drawer-overlay.on{display:block;}
.drawer{position:fixed;top:0;right:0;bottom:0;width:min(480px,92vw);background:var(--surface);box-shadow:-4px 0 24px rgba(0,0,0,.12);display:flex;flex-direction:column;z-index:301;transform:translateX(100%);transition:transform .25s;}
.drawer.on{transform:translateX(0);}
.drawer-header{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.drawer-header h2{font-size:.95rem;font-weight:700;}
.drawer-close{background:none;border:none;cursor:pointer;color:var(--ink-faint);font-size:1rem;}
.drawer-body{flex:1;overflow-y:auto;padding:1.25rem;}
.draft-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:1rem;margin-bottom:.75rem;}
.draft-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem;margin-bottom:.375rem;}
.draft-tag{font-family:var(--mono);font-size:.6rem;text-transform:uppercase;letter-spacing:.06em;padding:.13rem .45rem;border-radius:3px;background:var(--purple-light);color:var(--purple);}
.draft-meta{font-family:var(--mono);font-size:.62rem;color:var(--ink-faint);}
.draft-records{font-size:.78rem;font-weight:500;margin-bottom:.25rem;}
.draft-preview{font-size:.75rem;color:var(--ink-light);font-weight:300;line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:.625rem;}
.draft-btns{display:flex;gap:.375rem;}
.draft-btn{font-family:var(--sans);font-size:.72rem;padding:.3rem .65rem;border-radius:4px;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--ink-light);transition:all .15s;}
.draft-btn:hover{background:var(--surface2);color:var(--ink);}
.draft-btn.load{background:var(--purple-light);color:var(--purple);border-color:transparent;font-weight:500;}
.draft-btn.del:hover{background:var(--accent-light);color:var(--accent);border-color:var(--accent);}
.drafts-empty{text-align:center;padding:3rem 2rem;color:var(--ink-faint);font-size:.82rem;font-weight:300;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;z-index:400;background:rgba(26,23,20,.5);backdrop-filter:blur(3px);align-items:center;justify-content:center;padding:1.5rem;}
.modal-overlay.on{display:flex;}
.modal{background:var(--surface);border-radius:12px;width:min(540px,100%);padding:1.75rem;}
.modal h3{font-size:1rem;font-weight:700;margin-bottom:1.25rem;}
.mf{display:flex;flex-direction:column;gap:.35rem;margin-bottom:1rem;}
.mf label{font-size:.75rem;font-weight:500;color:var(--ink-light);}
.mf input,.mf textarea{background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:.55rem .825rem;font-family:var(--sans);font-size:.875rem;color:var(--ink);outline:none;transition:border-color .15s;width:100%;}
.mf input:focus,.mf textarea:focus{border-color:var(--purple);}
.mf textarea{resize:vertical;min-height:90px;line-height:1.65;}
.mf-hint{font-size:.68rem;color:var(--ink-faint);}
.modal-foot{display:flex;gap:.625rem;justify-content:flex-end;margin-top:1.25rem;}
.btn-cancel{font-family:var(--sans);font-size:.82rem;padding:.55rem 1rem;border-radius:5px;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--ink);}
.btn-save{font-family:var(--sans);font-size:.82rem;padding:.55rem 1.25rem;border-radius:5px;cursor:pointer;border:none;background:var(--purple);color:white;font-weight:700;}

.toast{display:none;position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);padding:.65rem 1.25rem;border-radius:6px;font-size:.82rem;z-index:500;white-space:nowrap;}
.toast.on{display:block;}
.toast.ok{background:var(--teal);color:white;}
.toast.err{background:var(--accent);color:white;}

@media(max-width:860px){
  .page-layout{grid-template-columns:1fr;}
  .right-panel{min-height:400px;border-top:1px solid var(--border);}
  header{padding:0 1.25rem;}
}
</style>
</head>
<body>

<header>
  <a class="logo" href="/"><img class="logo-mark" src="/kist_logo.png" alt="KIST"></a>
  <div class="header-right">
    <a class="header-btn" href="/records.html">紀錄庫</a>
    <button class="header-btn" onclick="openDrawer()">我的輸出草稿</button>
  </div>
</header>

<div class="page-layout">

  <!-- LEFT: 操作區 -->
  <div class="left-panel">
    <div class="left-scroll">

      <!-- Step 1: 選專案紀錄 -->
      <div id="s1">
        <div class="step-row">
          <div class="step-badge active" id="sb1">1</div>
          <div class="step-label">選擇專案紀錄</div>
        </div>
        <div style="display:flex;gap:.5rem;margin-bottom:1rem;">
          <div class="search-wrap" style="flex:1;margin-bottom:0;">
            <span class="search-icon">🔍</span>
            <input type="text" id="recSearch" placeholder="搜尋專案名稱…" oninput="renderRecords()">
          </div>
          <select id="recSort" onchange="renderRecords()" style="background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:.55rem .75rem;font-family:var(--sans);font-size:.78rem;color:var(--ink);outline:none;cursor:pointer;flex-shrink:0;">
            <option value="newest">最新</option>
            <option value="oldest">最早</option>
            <option value="name">名稱</option>
          </select>
        </div>
        <div class="record-list" id="recList"></div>
      </div>

      <!-- Step 2: 選格式（初始隱藏） -->
      <div id="s2" style="display:none;">
        <div class="step-row">
          <div class="step-badge done">1</div>
          <div class="step-label" id="s1Summary" style="font-size:.78rem;color:var(--ink-light);font-weight:400;"></div>
          <span class="step-edit" onclick="backToS1()">重選</span>
        </div>
        <div class="step-row" style="margin-top:.5rem;">
          <div class="step-badge active">2</div>
          <div class="step-label">選擇輸出格式</div>
        </div>

        <!-- Toggle -->
        <div class="fmt-toggle">
          <button class="fmt-toggle-btn active" id="togglePreset" onclick="switchFmtTab('preset')">預設格式</button>
          <button class="fmt-toggle-btn" id="toggleFree" onclick="switchFmtTab('free')">直接描述需求</button>
        </div>

        <!-- Tab A: 自訂 + 預設 -->
        <div id="tabPreset">
          <div id="customList"></div>
          <button class="add-custom-btn" onclick="openModal()">＋ 新增自訂格式</button>
          <div class="format-grid" id="presetGrid"></div>
        </div>

        <!-- Tab B: 自由描述 -->
        <div id="tabFree" style="display:none;">
          <div class="free-label">描述你想要的輸出</div>
          <textarea class="free-textarea" id="freePrompt" placeholder="例：寫一份給企業贊助方的 300 字成果摘要，語氣正式，強調學生改變…" oninput="updateGenBtn()"></textarea>
        </div>
      </div>

    </div>

    <!-- Sticky footer -->
    <div class="left-footer">
      <!-- Step 1 footer -->
      <div id="s1Footer">
        <div class="sel-count" id="selCount"></div>
        <button class="next-btn" id="nextBtn" onclick="goS2()" disabled>選好了，選擇格式 →</button>
      </div>
      <!-- Step 2 footer -->
      <div id="s2Footer" style="display:none;">
        <button class="generate-btn" id="genBtn" onclick="generate()" disabled>產出內容 →</button>
      </div>
    </div>
  </div>

  <!-- RIGHT: 輸出區 -->
  <div class="right-panel">
    <div class="output-header">
      <div class="output-title" id="outputTitle">產出結果</div>
      <div class="output-actions">
        <button class="btn-sm" id="copyBtn" onclick="copyOut()" style="display:none;">複製文字</button>
        <button class="btn-sm" id="dlBtn" onclick="dlTxt()" style="display:none;">下載 .txt</button>
        <button class="btn-sm dim" title="即將推出">存成 Google Doc</button>
        <button class="btn-sm teal" id="saveBtn" onclick="saveDraft()" style="display:none;">儲存草稿</button>
      </div>
    </div>
    <div class="output-body">
      <div class="output-loading" id="outLoading">
        <div class="spinner"></div>
        <div class="loading-label">AI 正在產出內容…</div>
      </div>
      <div class="output-placeholder" id="outPlaceholder">
        <div class="output-placeholder-icon">✍️</div>
        <div class="output-placeholder-text">選擇活動紀錄和輸出格式後<br>AI 產出的內容會出現在這裡</div>
      </div>
      <textarea class="output-editor" id="outEditor"></textarea>
    </div>
  </div>
</div>

<!-- 草稿 Drawer -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <h2>我的輸出草稿</h2>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
</div>

<!-- 新增自訂格式 Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOut(event)">
  <div class="modal">
    <h3>新增自訂格式</h3>
    <div class="mf">
      <label>格式名稱 *</label>
      <input type="text" id="mName" placeholder="例：學校粉專貼文">
    </div>
    <div class="mf">
      <label>用途說明</label>
      <input type="text" id="mDesc" placeholder="例：發在學校臉書，給家長和社區看">
    </div>
    <div class="mf">
      <label>給 AI 的指示 *</label>
      <textarea id="mPrompt" placeholder="說明語氣、字數、讀者、必須包含的元素…"></textarea>
      <span class="mf-hint">越具體越好</span>
    </div>
    <div class="mf">
      <label>參考範例（選填）</label>
      <textarea id="mExample" placeholder="貼上一個你認為寫得好的舊範例，AI 會參考它的風格來產出…"></textarea>
      <span class="mf-hint">直接貼文字即可，不需要上傳檔案</span>
    </div>
    <div class="modal-foot">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" onclick="saveCustom()">儲存格式</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const RK='kist_records', DK='kist_drafts', CK='kist_custom_formats';
let records=[], selIdxs=new Set(), selFmt=null, curOutput='', curFmtLabel='', fmtTab='preset';

const PRESETS=[
  {id:'fb',icon:'📘',name:'社群宣傳 FB 貼文',desc:'活動報名、回顧或招募，給粉專追蹤者看',
   prompt:`你是誠致教育基金會的社群媒體撰稿人。請根據以下專案 IOOI 資料，撰寫一篇適合發布在 Facebook 粉專的貼文。語氣溫暖有人情味，可使用 emoji，約 300-400 字，結尾加 2-3 個 hashtag。讀者是關心教育的粉專追蹤者。`},
  {id:'line',icon:'💬',name:'社群宣傳 LINE 群組',desc:'給曾參與 KIST 活動的學伴、實習生等',
   prompt:`你是誠致教育基金會的活動推廣撰稿人。請根據以下專案 IOOI 資料，撰寫一則適合發送到 LINE 群組的訊息。語氣像朋友轉傳，簡潔有力，約 150-250 字。讀者是曾參與 KIST 相關活動的人。`},
  {id:'email',icon:'📧',name:'社群宣傳 Email',desc:'給訂閱電子報或參與過活動的讀者',
   prompt:`你是誠致教育基金會的電子報撰稿人。請根據以下專案 IOOI 資料，撰寫一封活動宣傳 Email 的正文（不含主旨）。語氣專業但不生硬，約 400-500 字，包含活動亮點、主要資訊、行動呼籲。`},
  {id:'web',icon:'🌐',name:'官網文章（KIST 大小事）',desc:'給捐款人或對 KIST 有興趣的社會大眾',
   prompt:`你是誠致教育基金會的官網編輯。請根據以下專案 IOOI 資料，撰寫一篇適合在官網「KIST 大小事」發布的文章。語氣清楚易懂，約 600-800 字，有小標分段。遇到 KIST 術語（SEL、PBL、K Camp 等）第一次出現時加括號說明。讀者是捐款人和社會大眾。`},
  {id:'newsletter',icon:'📰',name:'電子報',desc:'給訂閱電子報的長期支持者',
   prompt:`你是誠致教育基金會的電子報編輯。請根據以下專案 IOOI 資料，撰寫一則電子報的專案成果報導。語氣有溫度有故事感，約 400-600 字，有導語和數據亮點。`},
  {id:'impact',icon:'📊',name:'公益報告',desc:'給捐款人和合作貴人看的成果報告',
   prompt:`你是誠致教育基金會的公益報告撰稿人。請根據以下專案 IOOI 資料，撰寫一段適合收錄在公益報告中的成果說明。語氣正式有說服力，約 500-700 字，依 IOOI 邏輯呈現，有數據支撐。遇到術語要加括號說明。讀者是捐款人和合作貴人。`},
  {id:'donor',icon:'🤝',name:'捐款人報告',desc:'給大額捐款人的專案進展報告',
   prompt:`你是誠致教育基金會的捐款人關係撰稿人。請根據以下專案 IOOI 資料，撰寫一份給指定捐款人的專案進展報告段落。語氣正式感謝有責信感，約 600-800 字，說明資金用途、執行成果、對受益者的改變、後續計畫。遇到術語要解釋。讀者是大額捐款人，重視透明度和具體影響力。`},
  {id:'school',icon:'🏫',name:'學校成果報告書',desc:'依 IOOI 框架，給贊助方的年度成果報告',
   prompt:`你是一位資深的 KIST 學年成果報告書撰稿顧問，精通 IOOI 評估框架。請根據以下專案資料，撰寫一份完整的 KIST 學校成果報告書段落。語氣正式有說服力，依 Input（投入）、Output（產出）、Outcome（成果）、Impact（影響力）四段呈現，各段 200-400 字。遇到術語第一次出現時加括號說明：KIST→KIST（KIPP Inspired Schools in Taiwan）、SEL→SEL（Social Emotional Learning，社會情緒學習）、PBL→PBL（Project-Based Learning，專題式學習）。讀者是贊助方、教育主管機關、政策倡議者。`}
];

function init(){
  records=JSON.parse(localStorage.getItem(RK)||'[]');
  const pre=localStorage.getItem('kist_output_record');
  if(pre){ try{ const r=JSON.parse(pre); const i=records.findIndex(x=>x.name===r.name&&x.savedAt===r.savedAt); if(i>=0) selIdxs.add(i); }catch(e){} localStorage.removeItem('kist_output_record'); }
  renderRecords(); renderPresets(); renderCustoms();
  updateS1Footer();
}

// ── Step 1 ──
function renderRecords(){
  const q=document.getElementById('recSearch').value.toLowerCase();
  const sort=document.getElementById('recSort').value;
  let filtered=records.filter(r=>!q||(r.name||'').toLowerCase().includes(q));
  if(sort==='name') filtered=[...filtered].sort((a,b)=>(a.name||'').localeCompare(b.name||''));
  else if(sort==='oldest') filtered=[...records.filter(r=>!q||(r.name||'').toLowerCase().includes(q))].reverse();
  const list=document.getElementById('recList');
  if(!filtered.length){
    list.innerHTML=`<div style="text-align:center;padding:1.5rem;color:var(--ink-faint);font-size:.78rem;">${q?'找不到符合的專案':'還沒有任何專案紀錄。<a href="/chatbot.html" style="color:var(--purple);">先去記錄專案成果</a>'}</div>`;
    return;
  }
  list.innerHTML=filtered.map(r=>{
    const i=records.indexOf(r); const sel=selIdxs.has(i);
    return `<div class="record-item ${sel?'selected':''}" onclick="toggleRec(${i})">
      <div class="rec-check">${sel?'✓':''}</div>
      <div class="rec-info">
        <div class="rec-name">${r.name||'未命名專案'}</div>
        <div class="rec-meta">${[r.date,r.location,r.owner].filter(Boolean).join('・')}</div>
      </div>
    </div>`;
  }).join('');
}

function toggleRec(i){ selIdxs.has(i)?selIdxs.delete(i):selIdxs.add(i); renderRecords(); updateS1Footer(); }

function updateS1Footer(){
  const n=selIdxs.size;
  document.getElementById('selCount').textContent=n?`已選取 ${n} 筆專案紀錄`:'';
  document.getElementById('nextBtn').disabled=n===0;
}

function goS2(){
  document.getElementById('s1').style.display='none';
  document.getElementById('s2').style.display='block';
  document.getElementById('s1Footer').style.display='none';
  document.getElementById('s2Footer').style.display='block';
  const names=Array.from(selIdxs).map(i=>records[i]?.name||'未命名').join('、');
  document.getElementById('s1Summary').textContent=`已選：${names}`;
  updateGenBtn();
}

function backToS1(){
  document.getElementById('s1').style.display='block';
  document.getElementById('s2').style.display='none';
  document.getElementById('s1Footer').style.display='block';
  document.getElementById('s2Footer').style.display='none';
  renderRecords();
}

// ── Step 2 ──
function switchFmtTab(tab){
  document.getElementById('togglePreset').classList.toggle('active', tab==='preset');
  document.getElementById('toggleFree').classList.toggle('active', tab==='free');
  document.getElementById('tabPreset').style.display = tab==='preset' ? 'block' : 'none';
  document.getElementById('tabFree').style.display = tab==='free' ? 'block' : 'none';
  if(tab==='preset') document.getElementById('freePrompt').value='';
  if(tab==='free') selFmt=null;
  renderPresets(); renderCustoms(); updateGenBtn();
}
function renderPresets(){
  document.getElementById('presetGrid').innerHTML=PRESETS.map(f=>`
    <div class="format-card ${selFmt?.id===f.id?'selected':''}" onclick="pickFmt('preset','${f.id}')">
      <div class="format-card-icon">${f.icon}</div>
      <div class="format-card-body">
        <div class="format-card-name">${f.name}</div>
        <div class="format-card-desc">${f.desc}</div>
      </div>
    </div>`).join('');
}

function renderCustoms(){
  const customs=JSON.parse(localStorage.getItem(CK)||'[]');
  document.getElementById('customList').innerHTML=customs.map((f,i)=>`
    <div class="custom-item ${selFmt?.id==='c'+i?'selected':''}" onclick="pickFmt('custom',${i})">
      <div class="rec-check">${selFmt?.id==='c'+i?'✓':''}</div>
      <div class="custom-item-name">${f.name}</div>
      <button class="custom-del" onclick="event.stopPropagation();delCustom(${i})">✕</button>
    </div>`).join('');
}

function pickFmt(type,id){
  if(type==='preset') selFmt=PRESETS.find(f=>f.id===id)||null;
  else{ const c=JSON.parse(localStorage.getItem(CK)||'[]')[id]; if(c) selFmt={id:'c'+id,name:c.name,prompt:c.prompt,example:c.example}; }
  renderPresets(); renderCustoms(); updateGenBtn();
}

function updateGenBtn(){
  const free=document.getElementById('freePrompt')?.value.trim();
  const presetTabActive=document.getElementById('tabPreset')?.style.display!=='none';
  document.getElementById('genBtn').disabled = presetTabActive ? !selFmt : !free;
}

// ── Generate ──
async function generate(){
  const free=document.getElementById('freePrompt').value.trim();
  if(!selFmt&&!free) return;

  const selRecs=Array.from(selIdxs).map(i=>records[i]).filter(Boolean);
  const data=selRecs.map(r=>{
    const d=r.ioiResult?.dimensions||{};
    return `【活動：${r.name}】日期：${r.date||''}　地點：${r.location||''}　負責人：${r.owner||''}
整體摘要：${r.ioiResult?.summary||''}
Input 投入：${d.input?.content||'（無資料）'}
Output 產出：${d.output?.content||'（無資料）'}
Outcome 成果：${d.outcome?.content||'（無資料）'}
Impact 影響力：${d.impact?.content||'（無資料）'}`;
  }).join('\n\n---\n\n');

  const fmtPrompt=selFmt?.prompt||'';
  const example=selFmt?.example?`\n\n以下是一個寫得好的參考範例，請參考它的風格和語氣：\n\n${selFmt.example}`:'';
  const freeInstr=free?`\n\n用戶額外指示：${free}`:'';
  const full=`${fmtPrompt}${example}${freeInstr}\n\n以下是專案 IOOI 資料：\n\n${data}\n\n請直接產出內容，不要加前言。使用繁體中文。`;

  document.getElementById('outPlaceholder').style.display='none';
  document.getElementById('outEditor').style.display='none';
  document.getElementById('outLoading').classList.add('on');
  document.getElementById('genBtn').disabled=true;

  try{
    const resp=await fetch('/api/check',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:[{role:'user',content:full}]})});
    const d=await resp.json();
    if(!resp.ok) throw new Error(d?.error?.message||'連線錯誤');
    curOutput=d.content?.[0]?.text||'';
    curFmtLabel=selFmt?.name||'自訂格式';
    document.getElementById('outLoading').classList.remove('on');
    const ed=document.getElementById('outEditor');
    ed.value=curOutput; ed.style.display='block';
    document.getElementById('outputTitle').textContent=curFmtLabel;
    ['copyBtn','dlBtn','saveBtn'].forEach(id=>document.getElementById(id).style.display='inline-block');
  }catch(err){
    document.getElementById('outLoading').classList.remove('on');
    document.getElementById('outPlaceholder').style.display='flex';
    toast('產出失敗：'+err.message,'err');
  }finally{ document.getElementById('genBtn').disabled=false; }
}

function copyOut(){ navigator.clipboard.writeText(document.getElementById('outEditor').value).then(()=>toast('✓ 已複製','ok')); }
function dlTxt(){
  const blob=new Blob([document.getElementById('outEditor').value],{type:'text/plain;charset=utf-8'});
  const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(blob),download:`${curFmtLabel}.txt`});
  a.click(); URL.revokeObjectURL(a.href);
}
function saveDraft(){
  const text=document.getElementById('outEditor').value;
  if(!text.trim()) return;
  const drafts=JSON.parse(localStorage.getItem(DK)||'[]');
  const names=Array.from(selIdxs).map(i=>records[i]?.name||'未命名').join('、');
  drafts.unshift({format:curFmtLabel,records:names,content:text,savedAt:new Date().toLocaleString('zh-TW',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})});
  localStorage.setItem(DK,JSON.stringify(drafts));
  renderDrawer(); toast('✓ 草稿已儲存','ok');
}

// ── Drawer ──
function openDrawer(){ renderDrawer(); document.getElementById('drawerOverlay').classList.add('on'); document.getElementById('drawer').classList.add('on'); }
function closeDrawer(){ document.getElementById('drawerOverlay').classList.remove('on'); document.getElementById('drawer').classList.remove('on'); }
function renderDrawer(){
  const drafts=JSON.parse(localStorage.getItem(DK)||'[]');
  const body=document.getElementById('drawerBody');
  if(!drafts.length){ body.innerHTML='<div class="drafts-empty">還沒有草稿。產出內容後儲存，就會出現在這裡。</div>'; return; }
  body.innerHTML=drafts.map((d,i)=>`
    <div class="draft-card">
      <div class="draft-card-top"><span class="draft-tag">${d.format}</span><span class="draft-meta">${d.savedAt}</span></div>
      <div class="draft-records">${d.records}</div>
      <div class="draft-preview">${d.content}</div>
      <div class="draft-btns">
        <button class="draft-btn load" onclick="loadDraft(${i})">載入編輯</button>
        <button class="draft-btn" onclick="cpDraft(${i})">複製</button>
        <button class="draft-btn" onclick="dlDraft(${i})">下載</button>
        <button class="draft-btn del" onclick="delDraft(${i})">刪除</button>
      </div>
    </div>`).join('');
}
function loadDraft(i){
  const d=JSON.parse(localStorage.getItem(DK)||'[]')[i]; if(!d) return;
  curOutput=d.content; curFmtLabel=d.format;
  const ed=document.getElementById('outEditor'); ed.value=d.content; ed.style.display='block';
  document.getElementById('outPlaceholder').style.display='none';
  document.getElementById('outputTitle').textContent=d.format;
  ['copyBtn','dlBtn','saveBtn'].forEach(id=>document.getElementById(id).style.display='inline-block');
  closeDrawer();
}
function cpDraft(i){ const d=JSON.parse(localStorage.getItem(DK)||'[]')[i]; navigator.clipboard.writeText(d?.content||'').then(()=>toast('✓ 已複製','ok')); }
function dlDraft(i){
  const d=JSON.parse(localStorage.getItem(DK)||'[]')[i]; if(!d) return;
  const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob([d.content],{type:'text/plain;charset=utf-8'})),download:`${d.format}.txt`});
  a.click(); URL.revokeObjectURL(a.href);
}
function delDraft(i){
  if(!confirm('確定要刪除這份草稿嗎？')) return;
  const drafts=JSON.parse(localStorage.getItem(DK)||'[]'); drafts.splice(i,1);
  localStorage.setItem(DK,JSON.stringify(drafts)); renderDrawer();
}

// ── Custom Format Modal ──
function openModal(){ document.getElementById('modalOverlay').classList.add('on'); ['mName','mDesc','mPrompt','mExample'].forEach(id=>document.getElementById(id).value=''); }
function closeModal(){ document.getElementById('modalOverlay').classList.remove('on'); }
function closeModalOut(e){ if(e.target===document.getElementById('modalOverlay')) closeModal(); }
function saveCustom(){
  const name=document.getElementById('mName').value.trim();
  const desc=document.getElementById('mDesc').value.trim();
  const prompt=document.getElementById('mPrompt').value.trim();
  const example=document.getElementById('mExample').value.trim();
  if(!name||!prompt){ toast('請填寫格式名稱和 AI 指示','err'); return; }
  const customs=JSON.parse(localStorage.getItem(CK)||'[]');
  customs.push({name,desc,prompt,example});
  localStorage.setItem(CK,JSON.stringify(customs));
  closeModal(); renderCustoms(); toast('✓ 自訂格式已儲存','ok');
}
function delCustom(i){
  if(!confirm('確定要刪除這個格式嗎？')) return;
  const customs=JSON.parse(localStorage.getItem(CK)||'[]'); customs.splice(i,1);
  localStorage.setItem(CK,JSON.stringify(customs));
  if(selFmt?.id==='c'+i) selFmt=null;
  renderCustoms(); updateGenBtn();
}

function toast(msg,type='ok'){
  const el=document.getElementById('toast'); el.textContent=msg; el.className=`toast on ${type}`;
  setTimeout(()=>el.classList.remove('on'),2500);
}

init();
</script>
