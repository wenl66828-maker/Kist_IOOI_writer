<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>記錄活動成果 — 誠致教育基金會</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+Antique:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
:root {
  --bg: #F7F4EF; --surface: #FFFFFF; --surface2: #F0EDE7;
  --ink: #1A1714; --ink-light: #6B6560; --ink-faint: #B0AAA3;
  --accent: #C4501A; --accent-light: #F5E8E2;
  --border: #DDD8D0; --kist-blue: #1B3A6B;
  --purple: #534AB7; --purple-light: #EEEDFE;
  --teal: #0F6E56; --teal-light: #E1F5EE;
  --amber: #854F0B; --amber-light: #FAEEDA;
  --sans: 'Zen Kaku Gothic Antique', sans-serif;
  --mono: 'DM Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--ink); font-family: var(--sans); font-weight: 400; line-height: 1.7; min-height: 100vh; display: flex; flex-direction: column; }

header { background: var(--kist-blue); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 60px; flex-shrink: 0; }
.logo { display: flex; align-items: center; text-decoration: none; }
.logo-mark { height: 28px; width: auto; }
nav { display: flex; gap: .25rem; }
.nav-link { font-size: .78rem; color: rgba(255,255,255,.5); text-decoration: none; padding: .375rem .7rem; border-radius: 4px; transition: all .15s; white-space: nowrap; }
.nav-link:hover { color: white; background: rgba(255,255,255,.08); }
.nav-link.active { color: white; background: rgba(255,255,255,.15); font-weight: 500; }

.page-header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1.25rem 2rem; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.page-header-left h1 { font-size: 1.1rem; font-weight: 700; margin-bottom: .15rem; }
.page-header-left p { font-size: .78rem; color: var(--ink-faint); font-weight: 300; }
.step-indicator { display: flex; align-items: center; gap: .5rem; }
.step-dot { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: .65rem; font-weight: 500; border: 1.5px solid var(--border); color: var(--ink-faint); transition: all .3s; }
.step-dot.active { background: var(--purple); border-color: var(--purple); color: white; }
.step-dot.done { background: var(--teal); border-color: var(--teal); color: white; }
.step-line { width: 28px; height: 1.5px; background: var(--border); transition: background .3s; }
.step-line.done { background: var(--teal); }

.workspace { flex: 1; display: flex; overflow: hidden; min-height: 0; }

/* ── SPLIT VIEW (Step 1+2) ── */
.split-view { display: grid; grid-template-columns: 1fr 1fr; width: 100%; }

.info-panel { background: var(--surface); border-right: 1px solid var(--border); padding: 1.75rem; overflow-y: auto; display: flex; flex-direction: column; }
.panel-label { font-family: var(--mono); font-size: .62rem; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 1.25rem; display: flex; align-items: center; gap: .5rem; }
.panel-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.field { display: flex; flex-direction: column; gap: .35rem; margin-bottom: 1.1rem; }
.field label { font-size: .78rem; font-weight: 500; color: var(--ink-light); }
.field-req { color: var(--accent); }
.field input, .field textarea { background: var(--bg); border: 1px solid var(--border); border-radius: 5px; padding: .6rem .875rem; font-family: var(--sans); font-size: .875rem; color: var(--ink); outline: none; transition: border-color .15s; }
.field input:focus, .field textarea:focus { border-color: var(--purple); }
.field textarea { resize: vertical; min-height: 90px; line-height: 1.65; }
.field-hint { font-size: .72rem; color: var(--ink-faint); }

.info-panel-footer { margin-top: auto; padding-top: 1.5rem; }
.start-btn { width: 100%; background: var(--purple); color: white; border: none; border-radius: 6px; padding: .8rem; font-family: var(--sans); font-size: .9rem; font-weight: 700; cursor: pointer; transition: opacity .15s; display: flex; align-items: center; justify-content: center; gap: .5rem; }
.start-btn:hover { opacity: .88; }
.start-btn:disabled { opacity: .4; cursor: not-allowed; }

.upload-panel { background: var(--bg); padding: 1.75rem; overflow-y: auto; display: flex; flex-direction: column; gap: 1.25rem; }
.upload-zone { border: 2px dashed var(--border); border-radius: 10px; padding: 3rem 2rem; text-align: center; cursor: pointer; transition: all .2s; background: var(--surface); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: .875rem; }
.upload-zone:hover, .upload-zone.drag-over { border-color: var(--purple); background: var(--purple-light); }
.upload-zone input[type=file] { display: none; }
.upload-zone-icon { font-size: 2.25rem; color: var(--ink-faint); }
.upload-zone.drag-over .upload-zone-icon { color: var(--purple); }
.upload-zone-title { font-size: .95rem; font-weight: 700; color: var(--ink); }
.upload-zone-desc { font-size: .8rem; color: var(--ink-faint); font-weight: 300; line-height: 1.6; }
.upload-zone-formats { display: flex; gap: .4rem; flex-wrap: wrap; justify-content: center; }
.format-chip { font-family: var(--mono); font-size: .62rem; padding: .15rem .5rem; border-radius: 3px; background: var(--surface2); color: var(--ink-faint); border: 1px solid var(--border); }

.file-list { display: flex; flex-direction: column; gap: .5rem; }
.file-item { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: .75rem 1rem; display: flex; align-items: center; gap: .875rem; }
.file-icon { font-size: 1.1rem; flex-shrink: 0; }
.file-info { flex: 1; min-width: 0; }
.file-name { font-size: .83rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.file-meta { font-size: .72rem; color: var(--ink-faint); font-family: var(--mono); }
.file-status { font-family: var(--mono); font-size: .62rem; padding: .15rem .5rem; border-radius: 3px; flex-shrink: 0; }
.file-status.ready { background: var(--teal-light); color: var(--teal); }
.file-status.parsing { background: var(--amber-light); color: var(--amber); }
.file-status.error { background: var(--accent-light); color: var(--accent); }
.file-remove { background: none; border: none; cursor: pointer; color: var(--ink-faint); font-size: .85rem; transition: color .15s; }
.file-remove:hover { color: var(--accent); }

/* ── ANALYSIS VIEW (Step 3) ── */
.analysis-view { display: none; width: 100%; grid-template-columns: 1fr 380px; min-height: 0; }
.analysis-view.visible { display: grid; }

.result-panel { padding: 1.75rem; overflow-y: auto; background: var(--bg); }
.result-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.5rem; gap: 1rem; flex-wrap: wrap; }
.result-header-left h2 { font-size: 1rem; font-weight: 700; margin-bottom: .2rem; }
.result-header-left p { font-size: .75rem; color: var(--ink-faint); font-family: var(--mono); }
.result-header-actions { display: flex; gap: .5rem; flex-shrink: 0; }
.btn-sm { font-family: var(--sans); font-size: .78rem; padding: .45rem .875rem; border-radius: 4px; cursor: pointer; transition: all .15s; border: 1px solid var(--border); background: var(--surface); color: var(--ink); }
.btn-sm:hover { background: var(--surface2); }
.btn-sm.primary { background: var(--teal); color: white; border-color: var(--teal); font-weight: 500; }
.btn-sm.primary:hover { opacity: .88; }

.summary-card { background: var(--purple-light); border-radius: 10px; padding: 1rem 1.25rem; margin-bottom: 1rem; font-size: .875rem; color: var(--ink); line-height: 1.8; font-weight: 300; }
.summary-label { font-weight: 700; color: var(--purple); font-size: .75rem; display: block; margin-bottom: .4rem; font-family: var(--mono); text-transform: uppercase; letter-spacing: .06em; }

.iooi-cards { display: flex; flex-direction: column; gap: .875rem; margin-bottom: 1rem; }
.iooi-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.iooi-card-header { padding: .875rem 1.25rem; display: flex; align-items: center; gap: .875rem; cursor: pointer; transition: background .15s; user-select: none; }
.iooi-card-header:hover { background: var(--surface2); }
.iooi-dim-tag { font-family: var(--mono); font-size: .6rem; text-transform: uppercase; letter-spacing: .08em; padding: .18rem .5rem; border-radius: 3px; flex-shrink: 0; }
.dim-input .iooi-dim-tag { background: var(--purple-light); color: var(--purple); }
.dim-output .iooi-dim-tag { background: var(--teal-light); color: var(--teal); }
.dim-outcome .iooi-dim-tag { background: var(--amber-light); color: var(--amber); }
.dim-impact .iooi-dim-tag { background: #E6F1FB; color: #185FA5; }
.iooi-dim-title { font-size: .875rem; font-weight: 700; flex: 1; }
.iooi-pct { font-family: var(--mono); font-size: .65rem; }
.iooi-pct.high { color: var(--teal); }
.iooi-pct.low { color: var(--amber); }
.iooi-chevron { color: var(--ink-faint); font-size: .72rem; transition: transform .2s; }
.iooi-card-header.open .iooi-chevron { transform: rotate(180deg); }
.iooi-card-body { display: none; padding: 1rem 1.25rem 1.25rem; border-top: 1px solid var(--border); font-size: .875rem; color: var(--ink-light); line-height: 1.85; font-weight: 300; white-space: pre-wrap; }
.iooi-card-body.open { display: block; }

.missing-box { background: var(--amber-light); border: 1px solid #E8C89A; border-radius: 10px; padding: 1.25rem; }
.missing-title { font-size: .82rem; font-weight: 700; color: var(--amber); margin-bottom: .75rem; }
.missing-items { display: flex; flex-direction: column; gap: .5rem; }
.missing-item { display: flex; gap: .625rem; font-size: .82rem; color: var(--ink); line-height: 1.6; }
.missing-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--amber); flex-shrink: 0; margin-top: .5rem; }
.photo-hint { margin-top: .875rem; padding-top: .875rem; border-top: 1px solid #E8C89A; font-size: .8rem; color: var(--ink); }

/* ── CHAT PANEL ── */
.chat-panel { background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; min-height: 0; }
.chat-header { padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.chat-header h3 { font-size: .875rem; font-weight: 700; margin-bottom: .1rem; }
.chat-header p { font-size: .72rem; color: var(--ink-faint); font-weight: 300; }
.chat-messages { flex: 1; overflow-y: auto; padding: 1.25rem; display: flex; flex-direction: column; gap: .875rem; min-height: 0; }
.msg { display: flex; gap: .625rem; align-items: flex-start; }
.msg.user { flex-direction: row-reverse; }
.msg-av { width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: .6rem; font-weight: 500; }
.msg.bot .msg-av { background: var(--purple-light); color: var(--purple); }
.msg.user .msg-av { background: var(--surface2); color: var(--ink-light); }
.msg-bubble { max-width: 82%; padding: .625rem .875rem; border-radius: 10px; font-size: .82rem; line-height: 1.65; font-weight: 300; }
.msg.bot .msg-bubble { background: var(--purple-light); color: var(--ink); border-radius: 3px 10px 10px 10px; }
.msg.user .msg-bubble { background: var(--ink); color: white; border-radius: 10px 3px 10px 10px; }
.typing-wrap .msg-bubble { padding: .5rem .75rem; }
.typing-dots { display: flex; gap: 3px; }
.typing-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--purple); animation: blink .9s ease-in-out infinite; }
.typing-dot:nth-child(2) { animation-delay: .2s; }
.typing-dot:nth-child(3) { animation-delay: .4s; }
@keyframes blink { 0%,80%,100%{opacity:.25;transform:scale(.8)} 40%{opacity:1;transform:scale(1)} }

.chat-input-row { padding: .875rem 1.25rem; border-top: 1px solid var(--border); display: flex; gap: .625rem; align-items: flex-end; flex-shrink: 0; }
.chat-input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: .625rem .875rem; font-family: var(--sans); font-size: .82rem; color: var(--ink); resize: none; outline: none; transition: border-color .15s; min-height: 38px; max-height: 120px; overflow-y: auto; line-height: 1.5; }
.chat-input:focus { border-color: var(--purple); }
.chat-input:empty::before { content: attr(data-placeholder); color: var(--ink-faint); pointer-events: none; }
.chat-send { background: var(--purple); color: white; border: none; border-radius: 8px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: .9rem; transition: opacity .15s; flex-shrink: 0; }
.chat-send:hover { opacity: .85; }
.chat-send:disabled { opacity: .35; cursor: not-allowed; }

/* ── LOADING ── */
.loading-overlay { display: none; position: fixed; inset: 0; background: rgba(26,23,20,.4); backdrop-filter: blur(3px); z-index: 100; align-items: center; justify-content: center; }
.loading-overlay.visible { display: flex; }
.loading-card { background: var(--surface); border-radius: 12px; padding: 2.5rem 2rem; text-align: center; width: min(340px, 90vw); }
.loading-spinner { width: 36px; height: 36px; border: 2px solid var(--border); border-top-color: var(--purple); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 1.25rem; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-title { font-size: .95rem; font-weight: 700; margin-bottom: .25rem; }
.loading-sub { font-size: .78rem; color: var(--ink-faint); font-weight: 300; margin-bottom: 1rem; }
.loading-steps { display: flex; flex-direction: column; gap: .35rem; text-align: left; }
.lstep { font-size: .78rem; color: var(--ink-faint); display: flex; align-items: center; gap: .5rem; transition: color .3s; }
.lstep.active { color: var(--ink); }
.lstep.done { color: var(--teal); }

.error-toast { display: none; position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); padding: .75rem 1.25rem; border-radius: 6px; font-size: .82rem; z-index: 200; max-width: 90vw; text-align: center; }
.error-toast.visible { display: block; }
.error-toast.err { background: var(--accent); color: white; }
.error-toast.ok { background: var(--teal); color: white; }

@media (max-width: 900px) {
  .split-view { grid-template-columns: 1fr; }
  .info-panel { border-right: none; border-bottom: 1px solid var(--border); max-height: 50vh; }
  .analysis-view { grid-template-columns: 1fr; }
  .chat-panel { border-left: none; border-top: 1px solid var(--border); height: 420px; }
  nav { display: none; }
  header { padding: 0 1.25rem; }
}
</style>
</head>
<body>

<header>
  <a class="logo" href="/"><img class="logo-mark" src="/kist_logo.png" alt="KIST"></a>
  <nav>
    <a class="nav-link active" href="/chatbot.html">記錄活動成果</a>
    <a class="nav-link" href="/records.html">紀錄庫</a>
    <a class="nav-link" href="/output.html">產出內容</a>
    <a class="nav-link" href="/guide.html">書寫指引</a>
  </nav>
</header>

<div class="page-header">
  <div class="page-header-left">
    <h1>記錄活動成果</h1>
    <p>上傳素材，AI 幫你整理成 IOOI 資料庫</p>
  </div>
  <div class="step-indicator">
    <div class="step-dot active" id="sdot1" title="填寫資訊 & 上傳素材">1</div>
    <div class="step-line" id="sline1"></div>
    <div class="step-dot" id="sdot2" title="分析結果 & 補充細節">2</div>
  </div>
</div>

<div class="workspace">

  <!-- Step 1: 左基本資訊 / 右上傳 -->
  <div class="split-view" id="splitView">

    <div class="info-panel">
      <div class="panel-label">基本資訊</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem;">
        <div class="field">
          <label>專案名稱 <span class="field-req">*</span></label>
          <input type="text" id="projName" placeholder="例：113 學年度家長日">
        </div>
        <div class="field">
          <label>負責人</label>
          <input type="text" id="projOwner" placeholder="例：王小明">
        </div>
      </div>
      <div class="field">
        <label>日期</label>
        <div style="display:flex;align-items:center;gap:.5rem;">
          <input type="date" id="projDateStart" style="flex:1;">
          <span style="color:var(--ink-faint);font-size:.8rem;flex-shrink:0;">至</span>
          <input type="date" id="projDateEnd" style="flex:1;">
        </div>
        <span class="field-hint">單日活動只填開始日期即可</span>
      </div>
      <div class="field">
        <label>地點</label>
        <input type="text" id="projLocation" placeholder="例：新北市致理科技大學">
      </div>
      <div class="field">
        <label>雲端資料連結</label>
        <input type="url" id="projDocsUrl" placeholder="計畫書、課表、照片等 Google Drive 連結">
      </div>
      <div class="field">
        <label>給 AI 的備注</label>
        <textarea id="projNote" placeholder="想讓 AI 特別注意的重點，或這個活動的特殊背景…"></textarea>
        <span class="field-hint">AI 會參考這段說明來調整分析方向</span>
      </div>
      <div class="info-panel-footer">
        <button class="start-btn" id="analyzeBtn" onclick="startAnalysis()" disabled>
          開始 AI 分析 →
        </button>
      </div>
    </div>

    <div class="upload-panel">
      <div class="panel-label">上傳素材</div>
      <div class="upload-zone" id="uploadZone"
        onclick="document.getElementById('fileInput').click()"
        ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
        <input type="file" id="fileInput" accept=".xlsx,.xls,.pdf,.doc,.docx,.txt,.csv" multiple onchange="handleFiles(event)">
        <div class="upload-zone-icon">📂</div>
        <div class="upload-zone-title">點擊選擇或拖曳素材至此</div>
        <div class="upload-zone-desc">可一次上傳多份，AI 統一讀取後整合分析</div>
        <div class="upload-zone-formats">
          <span class="format-chip">.xlsx</span>
          <span class="format-chip">.pdf</span>
          <span class="format-chip">.docx</span>
          <span class="format-chip">.csv</span>
          <span class="format-chip">.txt</span>
        </div>
      </div>
      <div class="file-list" id="fileList"></div>
    </div>
  </div>

  <!-- Step 3: 分析結果 + 聊天 -->
  <div class="analysis-view" id="analysisView">

    <div class="result-panel">
      <div class="result-header">
        <div class="result-header-left">
          <h2 id="resultTitle">分析結果</h2>
          <p id="resultMeta"></p>
        </div>
        <div class="result-header-actions">
          <button class="btn-sm" onclick="backToUpload()">← 重新上傳</button>
          <button class="btn-sm primary" onclick="saveRecord()">儲存這筆紀錄</button>
        </div>
      </div>
      <div id="ioiCards"></div>
    </div>

    <div class="chat-panel">
      <div class="chat-header">
        <h3>補充細節</h3>
        <p>AI 會針對缺少的資料繼續追問</p>
      </div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-row">
        <div class="chat-input" id="chatInput" contenteditable="true"
          data-placeholder="回答 AI 的問題，或補充任何細節…"
          onkeydown="onChatKey(event)"></div>
        <button class="chat-send" id="chatSend" onclick="sendChat()">→</button>
      </div>
    </div>
  </div>
</div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-card">
    <div class="loading-spinner"></div>
    <div class="loading-title">AI 正在分析素材</div>
    <div class="loading-sub">這可能需要 10–30 秒</div>
    <div class="loading-steps">
      <div class="lstep" id="ls1">○ 讀取素材內容</div>
      <div class="lstep" id="ls2">○ 依 IOOI 框架整理</div>
      <div class="lstep" id="ls3">○ 找出缺少的資料</div>
      <div class="lstep" id="ls4">○ 準備追問清單</div>
    </div>
  </div>
</div>

<div class="error-toast" id="toast"></div>

<script>
let files = [];
let ioiResult = null;
let chatHistory = [];
let record = null;

const DIMS = [
  { key: 'input',   label: 'Input 投入',    cls: 'dim-input' },
  { key: 'output',  label: 'Output 產出',   cls: 'dim-output' },
  { key: 'outcome', label: 'Outcome 成果',  cls: 'dim-outcome' },
  { key: 'impact',  label: 'Impact 影響力', cls: 'dim-impact' },
];

// ── 拖曳 ──────────────────────────────────────────
function onDragOver(e) { e.preventDefault(); document.getElementById('uploadZone').classList.add('drag-over'); }
function onDragLeave() { document.getElementById('uploadZone').classList.remove('drag-over'); }
function onDrop(e) { e.preventDefault(); document.getElementById('uploadZone').classList.remove('drag-over'); handleFiles({ target: { files: e.dataTransfer.files } }); }

// ── 檔案處理 ──────────────────────────────────────
function handleFiles(e) {
  Array.from(e.target.files || []).forEach(processFile);
  document.getElementById('fileInput').value = '';
}

async function processFile(file) {
  const entry = { id: Date.now() + Math.random(), name: file.name, size: file.size, text: '', status: 'parsing' };
  files.push(entry);
  renderFiles();

  try {
    const n = file.name.toLowerCase();
    if (n.endsWith('.txt') || n.endsWith('.csv')) {
      entry.text = await file.text();
    } else if (n.endsWith('.docx')) {
      const buf = await file.arrayBuffer();
      entry.text = (await mammoth.extractRawText({ arrayBuffer: buf })).value;
    } else if (n.endsWith('.pdf')) {
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      const pdf = await pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;
      let t = '';
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        t += (await page.getTextContent()).items.map(x => x.str).join(' ') + '\n';
      }
      entry.text = t;
    } else if (n.match(/\.xlsx?$/)) {
      if (!window.XLSX) await loadScript('https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js');
      const wb = XLSX.read(await file.arrayBuffer(), { type: 'array' });
      entry.text = wb.SheetNames.map(s => `[工作表：${s}]\n${XLSX.utils.sheet_to_csv(wb.Sheets[s])}`).join('\n\n');
    } else {
      entry.text = await file.text().catch(() => '');
    }
    entry.status = 'ready';
  } catch(err) {
    entry.status = 'error';
  }
  renderFiles();
  checkBtn();
}

function loadScript(src) {
  return new Promise((res, rej) => { const s = document.createElement('script'); s.src = src; s.onload = res; s.onerror = rej; document.head.appendChild(s); });
}

function removeFile(id) {
  files = files.filter(f => f.id !== id);
  renderFiles(); checkBtn();
}

function renderFiles() {
  const list = document.getElementById('fileList');
  list.innerHTML = files.map(f => {
    const icon = f.name.endsWith('.pdf') ? '📄' : f.name.match(/\.xlsx?/) ? '📊' : f.name.match(/\.docx?/) ? '📝' : '📃';
    const sz = f.size < 1048576 ? (f.size/1024).toFixed(1) + ' KB' : (f.size/1048576).toFixed(1) + ' MB';
    const stLabel = { ready: '已讀取', parsing: '解析中…', error: '讀取失敗' }[f.status];
    return `<div class="file-item">
      <div class="file-icon">${icon}</div>
      <div class="file-info"><div class="file-name">${f.name}</div><div class="file-meta">${sz}</div></div>
      <span class="file-status ${f.status}">${stLabel}</span>
      <button class="file-remove" onclick="removeFile(${f.id})">✕</button>
    </div>`;
  }).join('');
}

function checkBtn() {
  const name = document.getElementById('projName').value.trim();
  document.getElementById('analyzeBtn').disabled = !(name && files.some(f => f.status === 'ready'));
}
document.getElementById('projName').addEventListener('input', checkBtn);

// ── 分析 ──────────────────────────────────────────
const SYS = `你是誠致教育基金會的活動成果記錄助理，專精 IOOI 框架（Input 投入、Output 產出、Outcome 成果、Impact 影響力）。根據使用者上傳的素材，整理出一份完整的活動成果紀錄。只輸出純 JSON，不包含任何 markdown 語法。語言使用繁體中文。每個維度的內容要具體、有數字支撐。若素材中沒有某維度的資料，content 留空字串，completeness 設為 0。`;

async function startAnalysis() {
  const name = document.getElementById('projName').value.trim();
  const dateStart = document.getElementById('projDateStart').value;
  const dateEnd = document.getElementById('projDateEnd').value;
  const date = dateStart && dateEnd && dateStart !== dateEnd ? `${dateStart} 至 ${dateEnd}` : dateStart || dateEnd || '';
  const owner = document.getElementById('projOwner').value.trim();
  const note = document.getElementById('projNote').value.trim();
  const location = document.getElementById('projLocation').value.trim();
  const docsUrl = document.getElementById('projDocsUrl').value.trim();
  const ready = files.filter(f => f.status === 'ready');
  if (!name || !ready.length) return;

  setLoading(true);
  const combined = ready.map(f => `=== 素材：${f.name} ===\n${f.text}`).join('\n\n');

  const prompt = `請根據以下素材，整理出「${name}」的 IOOI 活動成果紀錄。

基本資訊：
- 專案名稱：${name}
- 日期：${date || '未提供'}
- 地點：${location || '未提供'}
- 負責人：${owner || '未提供'}
${docsUrl ? `- 資料連結：${docsUrl}` : ''}
${note ? `- 使用者備注：${note}` : ''}

素材內容：
${combined}

請輸出以下 JSON 格式：
{
  "summary": "<2-3句整體摘要>",
  "dimensions": {
    "input": { "content": "<投入的資源：人力、預算、合作夥伴等>", "completeness": <0-100> },
    "output": { "content": "<實際做了什麼：場次、人次、產出物等>", "completeness": <0-100> },
    "outcome": { "content": "<產生了什麼改變：態度、行為、關係等>", "completeness": <0-100> },
    "impact": { "content": "<對外的影響：媒體、其他組織、社區等>", "completeness": <0-100> }
  },
  "missing_info": [
    { "dimension": "<input|output|outcome|impact>", "item": "<缺少的資料>", "reason": "<為什麼重要>", "question": "<追問句子>" }
  ],
  "photo_prompt": "<建議使用者提供哪些類型的照片或圖表>"
}`;

  try {
    const resp = await fetch('/api/check', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: [{ role: 'system', content: SYS }, { role: 'user', content: prompt }] })
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data?.error?.message || '連線錯誤');
    const text = data.content?.[0]?.text || '';
    ioiResult = JSON.parse(text.replace(/```json\n?|\n?```/g,'').trim());
    record = { name, date, owner, location, docsUrl, note, files: ready.map(f => f.name) };
    renderResult(ioiResult, { name, date, owner });
    initChat(ioiResult, name);
    showStep3();
  } catch(err) {
    showToast('分析發生錯誤：' + err.message, 'err');
  } finally {
    setLoading(false);
  }
}

// ── 渲染結果 ──────────────────────────────────────
function renderResult(r, info) {
  document.getElementById('resultTitle').textContent = info.name;
  document.getElementById('resultMeta').textContent = [info.date, info.owner].filter(Boolean).join('・') || '';

  const cards = document.getElementById('ioiCards');
  cards.innerHTML = '';

  if (r.summary) {
    cards.innerHTML += `<div class="summary-card"><span class="summary-label">整體摘要</span>${r.summary}</div>`;
  }

  const dimCards = document.createElement('div');
  dimCards.className = 'iooi-cards';
  DIMS.forEach(d => {
    const dim = r.dimensions?.[d.key] || { content: '', completeness: 0 };
    const isOpen = dim.completeness < 80;
    const pctCls = dim.completeness >= 80 ? 'high' : 'low';
    const pctLabel = dim.completeness >= 80 ? '資料充足' : dim.completeness >= 40 ? '部分完整' : '資料不足';
    const card = document.createElement('div');
    card.className = `iooi-card ${d.cls}`;
    card.innerHTML = `
      <div class="iooi-card-header ${isOpen?'open':''}" onclick="toggleCard(this)">
        <span class="iooi-dim-tag">${d.label}</span>
        <span class="iooi-dim-title"></span>
        <span class="iooi-pct ${pctCls}">${dim.completeness}% ${pctLabel}</span>
        <span class="iooi-chevron">▼</span>
      </div>
      <div class="iooi-card-body ${isOpen?'open':''}">${dim.content || '（素材中未找到相關資料，請透過右側對話補充）'}</div>`;
    dimCards.appendChild(card);
  });
  cards.appendChild(dimCards);

  const missing = r.missing_info || [];
  if (missing.length || r.photo_prompt) {
    const box = document.createElement('div');
    box.className = 'missing-box';
    box.innerHTML = `<div class="missing-title">⚠ 補充以下資料，紀錄會更完整有說服力</div>
      <div class="missing-items">${missing.map(m => `
        <div class="missing-item"><div class="missing-dot"></div>
        <div><strong>${m.item}</strong>（${m.dimension}）：${m.reason}</div></div>`).join('')}
      </div>
      ${r.photo_prompt ? `<div class="photo-hint">📷 <strong>照片建議：</strong>${r.photo_prompt}</div>` : ''}`;
    cards.appendChild(box);
  }
}

function toggleCard(header) {
  header.classList.toggle('open');
  header.nextElementSibling.classList.toggle('open');
}

// ── 聊天 ──────────────────────────────────────────
function initChat(r, name) {
  chatHistory = [];
  document.getElementById('chatMessages').innerHTML = '';
  const missing = r.missing_info || [];
  let msg = '我已經把素材整理成 IOOI 紀錄了！';
  if (missing.length) {
    msg += `\n\n有 ${missing.length} 個地方還可以補充得更完整，我們先從最重要的開始——\n\n${missing[0].question}`;
  } else {
    msg += '\n\n整體資料相當完整！如果還有想補充的細節，直接告訴我。';
  }
  addBot(msg);
  chatHistory.push({ role: 'assistant', content: msg });
}

function addBot(text) {
  const msgs = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = `<div class="msg-av">AI</div><div class="msg-bubble">${text.replace(/\n/g,'<br>')}</div>`;
  msgs.appendChild(div); msgs.scrollTop = msgs.scrollHeight;
}
function addUser(text) {
  const msgs = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `<div class="msg-av">我</div><div class="msg-bubble">${text.replace(/\n/g,'<br>')}</div>`;
  msgs.appendChild(div); msgs.scrollTop = msgs.scrollHeight;
}
function setTyping(on) {
  const msgs = document.getElementById('chatMessages');
  const ex = msgs.querySelector('.typing-wrap');
  if (on && !ex) {
    const d = document.createElement('div');
    d.className = 'msg bot typing-wrap';
    d.innerHTML = `<div class="msg-av">AI</div><div class="msg-bubble"><div class="typing-dots"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>`;
    msgs.appendChild(d); msgs.scrollTop = msgs.scrollHeight;
  } else if (!on && ex) { ex.remove(); }
}

function onChatKey(e) { if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) { e.preventDefault(); sendChat(); } }

async function sendChat() {
  const input = document.getElementById('chatInput');
  const text = input.innerText.trim();
  if (!text) return;
  addUser(text);
  chatHistory.push({ role: 'user', content: text });
  input.innerText = '';
  document.getElementById('chatSend').disabled = true;
  setTyping(true);

  const sys = `你是誠致教育基金會的活動成果記錄助理。你正在幫使用者補充「${record?.name}」的 IOOI 活動紀錄。

目前 IOOI 初稿：
${JSON.stringify(ioiResult?.dimensions, null, 2)}

還缺少的資料：
${JSON.stringify(ioiResult?.missing_info, null, 2)}

請根據使用者的回答更新紀錄（在回覆中說明更新了什麼），並繼續追問下一個缺少的資料。每次只問一個問題。語氣親切口語。如果使用者說完成了，給一個總結。`;

  try {
    const resp = await fetch('/api/check', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: [{ role: 'system', content: sys }, ...chatHistory] })
    });
    const data = await resp.json();
    const reply = data.content?.[0]?.text || '抱歉，發生錯誤，請再試一次。';
    setTyping(false);
    addBot(reply);
    chatHistory.push({ role: 'assistant', content: reply });
  } catch { setTyping(false); addBot('連線發生問題，請再試一次。'); }
  finally { document.getElementById('chatSend').disabled = false; }
}

// ── 步驟控制 ──────────────────────────────────────
function showStep3() {
  document.getElementById('splitView').style.display = 'none';
  document.getElementById('analysisView').classList.add('visible');
  document.getElementById('sdot1').className = 'step-dot done';
  document.getElementById('sline1').className = 'step-line done';
  document.getElementById('sdot2').className = 'step-dot active';
}

function backToUpload() {
  document.getElementById('splitView').style.display = '';
  document.getElementById('analysisView').classList.remove('visible');
  document.getElementById('sdot1').className = 'step-dot active';
  document.getElementById('sdot2').className = 'step-dot';
  document.getElementById('sline1').className = 'step-line';
}

// ── Loading ────────────────────────────────────────
function setLoading(on) {
  document.getElementById('loadingOverlay').classList.toggle('visible', on);
  if (on) {
    const steps = ['ls1','ls2','ls3','ls4'];
    steps.forEach(s => { const el = document.getElementById(s); el.className = 'lstep'; el.textContent = '○ ' + el.textContent.slice(2); });
    [0,1200,2400,3600].forEach((delay, i) => setTimeout(() => {
      const el = document.getElementById(steps[i]);
      if (el) { el.className = 'lstep active'; el.textContent = '◐ ' + el.textContent.slice(2); }
      if (i > 0) { const prev = document.getElementById(steps[i-1]); if (prev) { prev.className = 'lstep done'; prev.textContent = '✓ ' + prev.textContent.slice(2); } }
    }, delay));
  }
}

// ── 儲存 ──────────────────────────────────────────
function saveRecord() {
  if (!record || !ioiResult) return;
  const all = JSON.parse(localStorage.getItem('kist_records') || '[]');
  all.unshift({ ...record, ioiResult, chatHistory, savedAt: new Date().toLocaleString('zh-TW', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' }) });
  localStorage.setItem('kist_records', JSON.stringify(all));
  showToast('✓ 紀錄已儲存！跳轉到紀錄庫…', 'ok');
  setTimeout(() => { window.location.href = '/records.html'; }, 1200);
}

function showToast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `error-toast visible ${type}`;
  setTimeout(() => el.classList.remove('visible'), 3500);
}
</script>
