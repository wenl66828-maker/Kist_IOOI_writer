<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>紀錄庫 — 誠致教育基金會</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+Antique:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F7F4EF; --surface: #FFFFFF; --surface2: #F0EDE7;
  --ink: #1A1714; --ink-light: #6B6560; --ink-faint: #B0AAA3;
  --accent: #C4501A; --accent-light: #F5E8E2;
  --border: #DDD8D0; --kist-blue: #1B3A6B;
  --purple: #534AB7; --purple-light: #EEEDFE;
  --teal: #0F6E56; --teal-light: #E1F5EE;
  --amber: #854F0B; --amber-light: #FAEEDA;
  --sans: 'Zen Kaku Gothic Antique', sans-serif;
  --mono: 'DM Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--ink); font-family: var(--sans); font-weight: 400; line-height: 1.7; min-height: 100vh; }

header { background: var(--kist-blue); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 200; }
.logo { display: flex; align-items: center; text-decoration: none; }
.logo-mark { height: 28px; width: auto; }
nav { display: flex; gap: .25rem; }
.nav-link { font-size: .78rem; color: rgba(255,255,255,.5); text-decoration: none; padding: .375rem .7rem; border-radius: 4px; transition: all .15s; white-space: nowrap; }
.nav-link:hover { color: white; background: rgba(255,255,255,.08); }
.nav-link.active { color: white; background: rgba(255,255,255,.15); font-weight: 500; }

main { max-width: 1100px; margin: 0 auto; padding: 2.5rem 2rem 6rem; }

.page-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.75rem; gap: 1rem; flex-wrap: wrap; }
.page-top h1 { font-size: 1.4rem; font-weight: 700; }
.new-btn { background: var(--purple); color: white; border: none; border-radius: 6px; padding: .6rem 1.1rem; font-family: var(--sans); font-size: .82rem; font-weight: 700; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: .35rem; transition: opacity .15s; }
.new-btn:hover { opacity: .88; }

.toolbar { display: flex; gap: .75rem; margin-bottom: 1.5rem; }
.search-wrap { flex: 1; position: relative; }
.search-wrap input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: .6rem 1rem .6rem 2.2rem; font-family: var(--sans); font-size: .875rem; color: var(--ink); outline: none; transition: border-color .15s; }
.search-wrap input:focus { border-color: var(--purple); }
.search-icon { position: absolute; left: .7rem; top: 50%; transform: translateY(-50%); color: var(--ink-faint); font-size: .8rem; pointer-events: none; }
.sort-select { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: .6rem .875rem; font-family: var(--sans); font-size: .82rem; color: var(--ink); outline: none; cursor: pointer; }

/* ── GRID ── */
.records-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }

.record-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.25rem; cursor: pointer; transition: border-color .2s, transform .15s; display: flex; flex-direction: column; gap: .75rem; }
.record-card:hover { border-color: var(--purple); transform: translateY(-2px); }
.record-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: .5rem; }
.record-name { font-size: .9rem; font-weight: 700; line-height: 1.35; flex: 1; }
.record-date { font-family: var(--mono); font-size: .65rem; color: var(--ink-faint); white-space: nowrap; flex-shrink: 0; }
.record-meta { display: flex; flex-wrap: wrap; gap: .35rem; }
.record-tag { font-size: .72rem; color: var(--ink-faint); display: flex; align-items: center; gap: .2rem; }
.record-summary { font-size: .8rem; color: var(--ink-light); line-height: 1.6; font-weight: 300; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.record-footer { display: flex; gap: .4rem; margin-top: auto; padding-top: .25rem; }
.record-btn-sm { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: .4rem .5rem; font-family: var(--sans); font-size: .72rem; color: var(--ink-light); cursor: pointer; transition: all .15s; text-align: center; }
.record-btn-sm:hover { background: var(--surface2); color: var(--ink); }
.record-btn-sm.purple { background: var(--purple-light); color: var(--purple); border-color: transparent; font-weight: 500; }
.record-btn-sm.purple:hover { opacity: .88; }

.empty-state { grid-column: 1/-1; text-align: center; padding: 5rem 2rem; }
.empty-icon { font-size: 2.5rem; margin-bottom: 1rem; opacity: .35; }
.empty-title { font-size: .95rem; font-weight: 700; color: var(--ink-light); margin-bottom: .5rem; }
.empty-desc { font-size: .82rem; color: var(--ink-faint); font-weight: 300; margin-bottom: 1.5rem; }

/* ── MODAL ── */
.modal-overlay { display: none; position: fixed; inset: 0; z-index: 300; background: rgba(26,23,20,.5); backdrop-filter: blur(3px); align-items: center; justify-content: center; padding: 1.5rem; }
.modal-overlay.visible { display: flex; }
.modal { background: var(--surface); border-radius: 12px; width: min(900px, 100%); max-height: 90vh; display: flex; flex-direction: column; }
.modal-header { background: var(--kist-blue); padding: 1.25rem 1.5rem; border-radius: 12px 12px 0 0; display: flex; align-items: center; gap: 1rem; flex-shrink: 0; }
.modal-title-wrap { flex: 1; min-width: 0; }
.modal-title-input { background: transparent; border: none; border-bottom: 1.5px solid rgba(255,255,255,.2); color: white; font-family: var(--sans); font-size: 1.1rem; font-weight: 700; width: 100%; outline: none; padding-bottom: .25rem; transition: border-color .15s; }
.modal-title-input:focus { border-bottom-color: rgba(255,255,255,.6); }
.modal-header-meta { font-size: .72rem; color: rgba(255,255,255,.45); font-family: var(--mono); margin-top: .25rem; }
.modal-close { background: none; border: none; color: rgba(255,255,255,.5); cursor: pointer; font-size: 1.1rem; transition: color .15s; flex-shrink: 0; }
.modal-close:hover { color: white; }

.modal-body { overflow-y: auto; flex: 1; }
.modal-cols { display: grid; grid-template-columns: 260px 1fr; min-height: 0; }

/* Left col: basic info */
.modal-left { padding: 1.25rem; border-right: 1px solid var(--border); overflow-y: auto; }
.modal-section-label { font-family: var(--mono); font-size: .6rem; text-transform: uppercase; letter-spacing: .1em; color: var(--ink-faint); margin-bottom: .875rem; display: flex; align-items: center; gap: .4rem; }
.modal-section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.edit-field { display: flex; flex-direction: column; gap: .3rem; margin-bottom: .875rem; }
.edit-field label { font-size: .72rem; color: var(--ink-faint); font-weight: 400; }
.edit-field input, .edit-field textarea {
  background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
  padding: .5rem .75rem; font-family: var(--sans); font-size: .82rem; color: var(--ink);
  outline: none; transition: border-color .15s; width: 100%;
}
.edit-field input:focus, .edit-field textarea:focus { border-color: var(--purple); }
.edit-field textarea { resize: vertical; min-height: 60px; line-height: 1.6; }
.docs-link { display: inline-flex; align-items: center; gap: .35rem; font-size: .78rem; color: var(--purple); text-decoration: none; margin-top: .25rem; }
.docs-link:hover { text-decoration: underline; }

/* Right col: IOOI */
.modal-right { padding: 1.25rem; overflow-y: auto; }
.iooi-edit-cards { display: flex; flex-direction: column; gap: .75rem; }
.iooi-edit-card { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.iooi-edit-header { padding: .75rem 1rem; display: flex; align-items: center; gap: .75rem; cursor: pointer; user-select: none; transition: background .15s; }
.iooi-edit-header:hover { background: var(--surface2); }
.dim-tag { font-family: var(--mono); font-size: .6rem; text-transform: uppercase; letter-spacing: .08em; padding: .18rem .5rem; border-radius: 3px; flex-shrink: 0; }
.dim-input .dim-tag { background: var(--purple-light); color: var(--purple); }
.dim-output .dim-tag { background: var(--teal-light); color: var(--teal); }
.dim-outcome .dim-tag { background: var(--amber-light); color: var(--amber); }
.dim-impact .dim-tag { background: #E6F1FB; color: #185FA5; }
.dim-title { font-size: .875rem; font-weight: 700; flex: 1; }
.iooi-chevron { color: var(--ink-faint); font-size: .72rem; transition: transform .2s; }
.iooi-edit-header.open .iooi-chevron { transform: rotate(180deg); }
.iooi-edit-body { display: none; border-top: 1px solid var(--border); }
.iooi-edit-body.open { display: block; }
.iooi-textarea {
  width: 100%; background: var(--surface); border: none; padding: 1rem;
  font-family: var(--sans); font-size: .875rem; color: var(--ink);
  line-height: 1.85; resize: vertical; min-height: 120px; outline: none;
  font-weight: 300;
}
.iooi-textarea:focus { background: #FAFAF8; }

.modal-footer { padding: 1rem 1.5rem; border-top: 1px solid var(--border); display: flex; gap: .625rem; justify-content: flex-end; flex-shrink: 0; }
.btn { font-family: var(--sans); font-size: .82rem; padding: .55rem 1.1rem; border-radius: 5px; cursor: pointer; transition: all .15s; border: 1px solid var(--border); background: var(--surface); color: var(--ink); }
.btn:hover { background: var(--surface2); }
.btn.primary { background: var(--teal); color: white; border-color: var(--teal); font-weight: 500; }
.btn.primary:hover { opacity: .88; }
.btn.purple { background: var(--purple); color: white; border-color: var(--purple); font-weight: 500; }
.btn.purple:hover { opacity: .88; }
.btn.danger { color: var(--accent); border-color: transparent; }
.btn.danger:hover { background: var(--accent-light); border-color: var(--accent); }

.toast { display: none; position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); padding: .7rem 1.25rem; border-radius: 6px; font-size: .82rem; z-index: 400; white-space: nowrap; }
.toast.visible { display: block; }
.select-mode-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: .6rem 1.1rem; font-family: var(--sans); font-size: .82rem; color: var(--ink-light); cursor: pointer; transition: all .15s; }
.select-mode-btn:hover { border-color: var(--purple); color: var(--purple); }
.select-mode-btn.active { background: var(--purple-light); border-color: var(--purple); color: var(--purple); font-weight: 500; }

.select-bar { background: var(--purple-light); border: 1px solid var(--purple); border-radius: 8px; padding: .75rem 1.25rem; margin-bottom: 1rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
.select-bar-count { font-size: .85rem; font-weight: 500; color: var(--purple); }
.select-all-btn { background: var(--purple-light); color: var(--purple); border-color: var(--purple); }

/* 選取框 overlay on card */
.record-card.select-mode { cursor: default; }
.record-card.select-mode:hover { transform: none; border-color: var(--border); }
.record-card.select-mode.checked { border-color: var(--purple); background: var(--purple-light); }
.record-checkbox-wrap { display: none; width: 20px; height: 20px; border: 1.5px solid var(--border); border-radius: 4px; flex-shrink: 0; align-items: center; justify-content: center; font-size: .72rem; background: white; transition: all .15s; cursor: pointer; }
.record-card.select-mode .record-checkbox-wrap { display: flex; }
.record-card.select-mode.checked .record-checkbox-wrap { background: var(--purple); border-color: var(--purple); color: white; }

.toast { display: none; position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); padding: .7rem 1.25rem; border-radius: 6px; font-size: .82rem; z-index: 400; white-space: nowrap; }
.toast.visible { display: block; }
.toast.ok { background: var(--teal); color: white; }
.toast.err { background: var(--accent); color: white; }

@media (max-width: 900px) {
  .records-grid { grid-template-columns: 1fr 1fr; }
  .modal-cols { grid-template-columns: 1fr; }
  .modal-left { border-right: none; border-bottom: 1px solid var(--border); }
}
@media (max-width: 600px) {
  .records-grid { grid-template-columns: 1fr; }
  nav { display: none; }
  header { padding: 0 1.25rem; }
  main { padding: 2rem 1.25rem 4rem; }
}
</style>
</head>
<body>

<header>
  <a class="logo" href="/"><img class="logo-mark" src="/kist_logo.png" alt="KIST"></a>
  <nav>
    <a class="nav-link" href="/chatbot.html">紀錄專案成果</a>
    <a class="nav-link active" href="/records.html">紀錄庫</a>
    <a class="nav-link" href="/output.html">產出內容</a>
    <a class="nav-link" href="/guide.html">書寫指引</a>
  </nav>
</header>

<main>
  <div class="page-top">
    <h1>紀錄庫</h1>
    <div style="display:flex;gap:.625rem;">
      <button class="select-mode-btn" id="selectModeBtn" onclick="toggleSelectMode()">選取專案</button>
      <a class="new-btn" href="/chatbot.html">＋ 新增專案紀錄</a>
    </div>
  </div>

  <!-- 選取模式操作列（平時隱藏） -->
  <div class="select-bar" id="selectBar" style="display:none;">
    <span class="select-bar-count" id="selectBarCount">已選取 0 筆</span>
    <div style="display:flex;gap:.5rem;">
      <button class="btn select-all-btn" onclick="selectAll()">全選</button>
      <button class="btn primary" onclick="goOutputSelected()">產出內容 →</button>
    </div>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="搜尋專案名稱…" oninput="renderList()">
    </div>
    <select class="sort-select" id="sortSelect" onchange="renderList()">
      <option value="newest">最新儲存</option>
      <option value="oldest">最早儲存</option>
      <option value="name">名稱排序</option>
    </select>
  </div>

  <div class="records-grid" id="recordsGrid"></div>
</main>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title-wrap">
        <input class="modal-title-input" id="modalTitleInput" type="text" placeholder="活動名稱">
        <div class="modal-header-meta" id="modalMeta"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-cols">
        <!-- Left: basic info edit -->
        <div class="modal-left">
          <div class="modal-section-label">基本資訊</div>
          <div class="edit-field">
            <label>日期</label>
            <input type="text" id="editDate" placeholder="例：2025/8/6 - 8/8">
          </div>
          <div class="edit-field">
            <label>地點</label>
            <input type="text" id="editLocation" placeholder="地點">
          </div>
          <div class="edit-field">
            <label>負責人</label>
            <input type="text" id="editOwner" placeholder="負責人">
          </div>
          <div class="edit-field">
            <label>雲端資料連結</label>
            <input type="url" id="editDocsUrl" placeholder="Google Drive 連結">
            <a id="editDocsLink" class="docs-link" href="#" target="_blank" style="display:none">↗ 開啟連結</a>
          </div>
          <div class="edit-field">
            <label>整體摘要</label>
            <textarea id="editSummary" placeholder="活動的整體摘要…"></textarea>
          </div>
          <div class="modal-section-label" style="margin-top:1rem;">上傳的素材</div>
          <div id="modalFiles" style="display:flex;flex-wrap:wrap;gap:.35rem;"></div>
        </div>

        <!-- Right: IOOI edit -->
        <div class="modal-right">
          <div class="modal-section-label">IOOI 內容</div>
          <div class="iooi-edit-cards" id="ioiEditCards"></div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn danger" onclick="deleteCurrentRecord()">刪除</button>
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn purple" onclick="goToOutputCurrent()">產出內容 →</button>
      <button class="btn primary" onclick="saveEdits()">儲存修改</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const KEY = 'kist_records';
let records = [];
let currentIdx = null;

const DIMS = [
  { key: 'input',   label: 'Input 投入',    cls: 'dim-input' },
  { key: 'output',  label: 'Output 產出',   cls: 'dim-output' },
  { key: 'outcome', label: 'Outcome 成果',  cls: 'dim-outcome' },
  { key: 'impact',  label: 'Impact 影響力', cls: 'dim-impact' },
];

function init() {
  records = JSON.parse(localStorage.getItem(KEY) || '[]');
  renderList();
}

function renderList() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const sort = document.getElementById('sortSelect').value;

  let filtered = records.filter(r => !q || (r.name||'').toLowerCase().includes(q));
  if (sort === 'name') filtered.sort((a,b) => (a.name||'').localeCompare(b.name||''));
  else if (sort === 'oldest') filtered = [...filtered].reverse();

  const grid = document.getElementById('recordsGrid');

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📂</div>
      <div class="empty-title">${q ? '找不到符合的紀錄' : '還沒有任何活動紀錄'}</div>
      <div class="empty-desc">${q ? '試試不同的關鍵字' : '上傳活動素材，AI 幫你整理成完整的 IOOI 資料庫'}</div>
      ${!q ? `<a class="new-btn" href="/chatbot.html">＋ 新增第一筆</a>` : ''}
    </div>`;
    return;
  }

  grid.innerHTML = filtered.map(r => {
    const idx = records.indexOf(r);
    const metaParts = [
      r.location && `📍 ${r.location}`,
      r.owner && `👤 ${r.owner}`,
      r.files?.length && `📎 ${r.files.length} 份`,
    ].filter(Boolean);

    const isChecked = selectedIdxs.has(idx);
    return `<div class="record-card ${selectMode?'select-mode':''} ${isChecked?'checked':''}"
      onclick="${selectMode ? `toggleCheck(${idx})` : `openModal(${idx})`}">
      <div class="record-card-top">
        <div class="record-checkbox-wrap" onclick="event.stopPropagation();toggleCheck(${idx})">${isChecked?'✓':''}</div>
        <div class="record-name">${r.name || '未命名專案'}</div>
        <div class="record-date">${r.date || ''}</div>
      </div>
      ${metaParts.length ? `<div class="record-meta">${metaParts.map(p=>`<span class="record-tag">${p}</span>`).join('')}</div>` : ''}
      <div class="record-summary">${r.ioiResult?.summary || '（無摘要）'}</div>
      ${!selectMode ? `<div class="record-footer" onclick="event.stopPropagation()">
        <button class="record-btn-sm purple" onclick="openModal(${idx})">查看 / 編輯</button>
        <button class="record-btn-sm" onclick="goToOutputWith(${idx})">產出內容</button>
      </div>` : ''}
    </div>`;
  }).join('');
}

// ── 選取模式 ──────────────────────────────────
let selectMode = false;
let selectedIdxs = new Set();

function toggleSelectMode() {
  selectMode = !selectMode;
  selectedIdxs.clear();
  document.getElementById('selectModeBtn').classList.toggle('active', selectMode);
  document.getElementById('selectBar').style.display = selectMode ? 'flex' : 'none';
  updateSelectBar();
  renderList();
}

function toggleCheck(idx) {
  if (!selectMode) return;
  selectedIdxs.has(idx) ? selectedIdxs.delete(idx) : selectedIdxs.add(idx);
  updateSelectBar();
  renderList();
}

function selectAll() {
  records.forEach((_, i) => selectedIdxs.add(i));
  updateSelectBar();
  renderList();
}

function clearSelection() {
  selectedIdxs.clear();
  updateSelectBar();
  renderList();
}

function updateSelectBar() {
  document.getElementById('selectBarCount').textContent = `已選取 ${selectedIdxs.size} 筆`;
}

function goOutputSelected() {
  if (selectedIdxs.size === 0) { showToast('請先選取至少一筆紀錄', 'err'); return; }
  const selected = Array.from(selectedIdxs).map(i => records[i]).filter(Boolean);
  localStorage.setItem('kist_output_records', JSON.stringify(selected));
  window.location.href = '/output.html?mode=step2';
}

function openModal(idx) {
  currentIdx = idx;
  const r = records[idx];
  if (!r) return;

  // 填入基本資訊
  document.getElementById('modalTitleInput').value = r.name || '';
  document.getElementById('modalMeta').textContent = r.savedAt ? `儲存於 ${r.savedAt}` : '';
  document.getElementById('editDate').value = r.date || '';
  document.getElementById('editLocation').value = r.location || '';
  document.getElementById('editOwner').value = r.owner || '';
  document.getElementById('editDocsUrl').value = r.docsUrl || '';
  document.getElementById('editSummary').value = r.ioiResult?.summary || '';

  // 連結
  const link = document.getElementById('editDocsLink');
  if (r.docsUrl) { link.href = r.docsUrl; link.style.display = 'inline-flex'; }
  else { link.style.display = 'none'; }
  document.getElementById('editDocsUrl').addEventListener('input', function() {
    if (this.value) { link.href = this.value; link.style.display = 'inline-flex'; }
    else { link.style.display = 'none'; }
  });

  // 素材清單
  const filesEl = document.getElementById('modalFiles');
  filesEl.innerHTML = r.files?.length
    ? r.files.map(f => `<span style="font-family:var(--mono);font-size:.68rem;padding:.2rem .5rem;background:var(--surface2);border-radius:3px;color:var(--ink-light);">${f}</span>`).join('')
    : '<span style="font-size:.78rem;color:var(--ink-faint);">（無素材）</span>';

  // IOOI 可編輯卡片
  const dims = r.ioiResult?.dimensions || {};
  const cards = document.getElementById('ioiEditCards');
  cards.innerHTML = DIMS.map(d => {
    const content = dims[d.key]?.content || '';
    return `<div class="iooi-edit-card ${d.cls}">
      <div class="iooi-edit-header open" onclick="toggleIooi(this)">
        <span class="dim-tag">${d.label}</span>
        <span class="dim-title"></span>
        <span class="iooi-chevron">▼</span>
      </div>
      <div class="iooi-edit-body open">
        <textarea class="iooi-textarea" id="edit-dim-${d.key}" placeholder="（尚無資料，可直接輸入或補充）">${content}</textarea>
      </div>
    </div>`;
  }).join('');

  document.getElementById('modalOverlay').classList.add('visible');
  document.body.style.overflow = 'hidden';
}

function toggleIooi(header) {
  header.classList.toggle('open');
  header.nextElementSibling.classList.toggle('open');
}

function saveEdits() {
  if (currentIdx === null) return;
  const r = records[currentIdx];

  r.name = document.getElementById('modalTitleInput').value.trim() || r.name;
  r.date = document.getElementById('editDate').value.trim();
  r.location = document.getElementById('editLocation').value.trim();
  r.owner = document.getElementById('editOwner').value.trim();
  r.docsUrl = document.getElementById('editDocsUrl').value.trim();

  if (!r.ioiResult) r.ioiResult = { dimensions: {} };
  if (!r.ioiResult.dimensions) r.ioiResult.dimensions = {};
  r.ioiResult.summary = document.getElementById('editSummary').value.trim();

  DIMS.forEach(d => {
    const val = document.getElementById(`edit-dim-${d.key}`)?.value || '';
    if (!r.ioiResult.dimensions[d.key]) r.ioiResult.dimensions[d.key] = { content: '', completeness: 0 };
    r.ioiResult.dimensions[d.key].content = val;
  });

  localStorage.setItem(KEY, JSON.stringify(records));
  renderList();
  showToast('✓ 已儲存修改', 'ok');
}

function deleteCurrentRecord() {
  if (currentIdx === null) return;
  if (!confirm('確定要刪除這筆紀錄嗎？')) return;
  records.splice(currentIdx, 1);
  localStorage.setItem(KEY, JSON.stringify(records));
  closeModal();
  renderList();
  showToast('已刪除', 'ok');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('visible');
  document.body.style.overflow = '';
  currentIdx = null;
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function goToOutputCurrent() {
  if (currentIdx !== null) goToOutputWith(currentIdx);
}

function goToOutputWith(idx) {
  localStorage.setItem('kist_output_record', JSON.stringify(records[idx]));
  window.location.href = '/output.html';
}

function showToast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast visible ${type}`;
  setTimeout(() => el.classList.remove('visible'), 2500);
}

init();
</script>
</body>
</html>
